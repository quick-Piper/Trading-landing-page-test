<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexFlow Binary — Trade Smart. Live Free.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #060810;
    --surface: #0C1018;
    --card: #111720;
    --card2: #161D2B;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --gold: #D4A847;
    --gold-dim: #9A7530;
    --gold-glow: rgba(212,168,71,0.15);
    --gold-text: #E8C06A;
    --mint: #00D882;
    --mint-dim: rgba(0,216,130,0.12);
    --red: #FF4D5B;
    --red-dim: rgba(255,77,91,0.12);
    --text: #E4E9F0;
    --text-muted: #6B7A90;
    --text-dim: #3D4A5C;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(212,168,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,168,71,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 6%;
    height: 70px;
    background: rgba(6,8,16,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-head);
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    letter-spacing: 0.3px;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--gold);
    color: #0a0800;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.875rem;
    padding: 0.6rem 1.4rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .nav-cta:hover { background: var(--gold-text); transform: translateY(-1px); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 120px 6% 80px;
    overflow: hidden;
  }
  .hero-glow {
    position: absolute;
    top: -10%;
    right: -5%;
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(212,168,71,0.08) 0%, transparent 65%);
    pointer-events: none;
  }
  .hero-glow2 {
    position: absolute;
    bottom: -20%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(0,216,130,0.05) 0%, transparent 65%);
    pointer-events: none;
  }
  .hero-inner {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 5rem;
    align-items: center;
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold-glow);
    border: 1px solid rgba(212,168,71,0.25);
    color: var(--gold-text);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 0.4rem 1rem;
    border-radius: 100px;
    margin-bottom: 1.8rem;
  }
  .badge-dot {
    width: 7px; height: 7px;
    background: var(--mint);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }
  .hero h1 {
    font-family: var(--font-head);
    font-size: clamp(2.8rem, 5vw, 4.5rem);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -2px;
    color: #fff;
    margin-bottom: 1.5rem;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--gold);
    position: relative;
  }
  .hero h1 em::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
    border-radius: 2px;
  }
  .hero-sub {
    font-size: 1.1rem;
    color: var(--text-muted);
    max-width: 520px;
    margin-bottom: 2.5rem;
    line-height: 1.75;
  }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--gold);
    color: #0a0800;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 1rem;
    padding: 0.85rem 1.8rem;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-primary:hover { background: var(--gold-text); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(212,168,71,0.25); }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent;
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 1rem;
    padding: 0.85rem 1.8rem;
    border-radius: 8px;
    text-decoration: none;
    border: 1px solid var(--border-strong);
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-ghost:hover { border-color: var(--gold-dim); color: var(--gold-text); }
  .hero-trust {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }
  .trust-item { display: flex; flex-direction: column; }
  .trust-num {
    font-family: var(--font-mono);
    font-size: 1.4rem;
    color: #fff;
    font-weight: 700;
  }
  .trust-label { font-size: 0.8rem; color: var(--text-muted); }
  .trust-divider { width: 1px; height: 36px; background: var(--border-strong); }

  /* ── PHONE MOCKUP ── */
  .phone-wrap {
    position: relative;
    display: flex;
    justify-content: center;
  }
  .phone-outer {
    position: relative;
    width: 270px;
    background: var(--card);
    border-radius: 42px;
    padding: 14px;
    border: 1px solid var(--border-strong);
    box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
    animation: float 5s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .phone-screen {
    background: #0A0E18;
    border-radius: 32px;
    overflow: hidden;
    padding: 20px 16px;
    min-height: 520px;
  }
  .phone-notch {
    width: 80px; height: 8px;
    background: var(--card);
    border-radius: 4px;
    margin: 0 auto 20px;
  }
  .phone-header { margin-bottom: 16px; }
  .phone-header p { font-size: 0.7rem; color: var(--text-muted); }
  .phone-header h3 { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; color: #fff; }
  .chart-area {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .chart-label { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 4px; }
  .chart-value { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 700; color: var(--mint); }
  .chart-change { font-size: 0.65rem; color: var(--mint); }
  .mini-chart { margin-top: 10px; }
  .mini-chart svg { width: 100%; height: 60px; }
  .trade-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 0.72rem;
  }
  .trade-asset { color: #fff; font-weight: 500; }
  .trade-dir-up {
    background: var(--mint-dim);
    color: var(--mint);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.65rem;
  }
  .trade-dir-down {
    background: var(--red-dim);
    color: var(--red);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.65rem;
  }
  .trade-pnl-up { color: var(--mint); font-family: var(--font-mono); font-size: 0.7rem; }
  .trade-pnl-down { color: var(--red); font-family: var(--font-mono); font-size: 0.7rem; }
  .phone-balance {
    background: linear-gradient(135deg, rgba(212,168,71,0.18), rgba(212,168,71,0.05));
    border: 1px solid rgba(212,168,71,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 4px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bal-label { font-size: 0.65rem; color: var(--gold-dim); }
  .bal-value { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--gold-text); }
  .phone-badges {
    position: absolute;
    right: -30px;
    top: 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .float-badge {
    background: var(--card2);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.75rem;
    white-space: nowrap;
    animation: float-badge 4s ease-in-out infinite;
  }
  .float-badge:nth-child(2) { animation-delay: 2s; }
  @keyframes float-badge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(6px); }
  }
  .fb-amount { font-family: var(--font-mono); font-weight: 700; color: var(--mint); }
  .fb-label { color: var(--text-muted); font-size: 0.68rem; }

  /* ── TICKER ── */
  .ticker-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .ticker-track {
    display: flex;
    gap: 0;
    animation: ticker 28s linear infinite;
    width: max-content;
  }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .tick-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 32px;
    font-size: 0.8rem;
    border-right: 1px solid var(--border);
  }
  .tick-name { color: var(--text-muted); font-family: var(--font-mono); }
  .tick-price { color: #fff; font-family: var(--font-mono); }
  .tick-up { color: var(--mint); font-size: 0.72rem; }
  .tick-down { color: var(--red); font-size: 0.72rem; }

  /* ── SECTIONS ── */
  section { position: relative; z-index: 1; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 6%; }
  .section-pad { padding: 100px 0; }

  .section-eyebrow {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: var(--font-head);
    font-size: clamp(2rem, 3.5vw, 3rem);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 1rem;
  }
  .section-sub {
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 560px;
    line-height: 1.75;
  }
  .text-center { text-align: center; }
  .text-center .section-sub { margin: 0 auto; }

  /* ── HOW IT WORKS ── */
  .how-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5px;
    margin-top: 4rem;
    background: var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .how-card {
    background: var(--card);
    padding: 2.5rem 2rem;
    position: relative;
    transition: background 0.3s;
  }
  .how-card:hover { background: var(--card2); }
  .step-num {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 1.5rem;
  }
  .step-icon {
    width: 52px; height: 52px;
    background: var(--gold-glow);
    border: 1px solid rgba(212,168,71,0.2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .how-card h3 {
    font-family: var(--font-head);
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.75rem;
  }
  .how-card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; }
  .how-connector {
    position: absolute;
    top: 50%; right: -1px;
    width: 24px; height: 24px;
    background: var(--gold);
    border-radius: 50%;
    transform: translateY(-50%) translateX(50%);
    z-index: 2;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    color: #0a0800;
    font-weight: 700;
  }

  /* ── WHY BINARY ── */
  .why-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
  }
  .feature-list { margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .feature-item {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    padding: 1.25rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color 0.3s;
  }
  .feature-item:hover { border-color: var(--gold-dim); }
  .feature-icon {
    width: 38px; height: 38px; flex-shrink: 0;
    background: var(--gold-glow);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  .feature-item h4 { font-size: 0.95rem; font-weight: 500; color: #fff; margin-bottom: 0.2rem; }
  .feature-item p { font-size: 0.875rem; color: var(--text-muted); line-height: 1.6; }

  /* Comparison table */
  .compare-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 2.5rem;
  }
  .compare-head {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    background: var(--surface);
    padding: 1rem 1.5rem;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .compare-row {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    padding: 1rem 1.5rem;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.2s;
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-row:hover { background: rgba(255,255,255,0.02); }
  .compare-row .label { color: var(--text-muted); font-size: 0.875rem; }
  .cell-binary { color: var(--mint); font-weight: 500; }
  .cell-forex { color: var(--text-muted); font-size: 0.85rem; }
  .badge-winner {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,216,130,0.1);
    border: 1px solid rgba(0,216,130,0.2);
    color: var(--mint);
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 100px;
    margin-left: 8px;
  }

  /* ── SERVICES ── */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    margin-top: 3.5rem;
  }
  .service-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .service-card:hover { border-color: var(--gold-dim); transform: translateY(-4px); }
  .service-card:hover::before { opacity: 1; }
  .service-card.featured {
    grid-column: span 2;
    background: linear-gradient(135deg, rgba(212,168,71,0.07), rgba(212,168,71,0.02));
    border-color: rgba(212,168,71,0.2);
  }
  .service-card.featured::before { opacity: 1; }
  .service-emoji { font-size: 2.2rem; margin-bottom: 1.2rem; display: block; }
  .service-pill {
    display: inline-block;
    background: rgba(212,168,71,0.12);
    color: var(--gold-text);
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 1rem;
  }
  .service-card h3 {
    font-family: var(--font-head);
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.75rem;
  }
  .service-card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.75; margin-bottom: 1.5rem; }
  .service-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .service-bullets li {
    font-size: 0.875rem;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 10px;
  }
  .service-bullets li::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .service-price {
    margin-top: 1.8rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 8px;
  }
  .price-from { font-size: 0.8rem; color: var(--text-muted); }
  .price-main {
    font-family: var(--font-mono);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold-text);
  }
  .price-period { font-size: 0.8rem; color: var(--text-muted); }

  /* ── TESTIMONIALS ── */
  .testimonials-section { background: var(--surface); }
  .testi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3.5rem;
  }
  .testi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    position: relative;
    transition: border-color 0.3s;
  }
  .testi-card:hover { border-color: var(--gold-dim); }
  .stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 1rem; letter-spacing: 2px; }
  .testi-text {
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.75;
    margin-bottom: 1.5rem;
    font-style: italic;
  }
  .testi-author { display: flex; align-items: center; gap: 12px; }
  .testi-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--gold-glow);
    border: 1px solid rgba(212,168,71,0.3);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold-text);
  }
  .testi-name { font-size: 0.9rem; font-weight: 500; color: #fff; }
  .testi-loc { font-size: 0.78rem; color: var(--text-muted); }
  .testi-return {
    position: absolute;
    top: 1.5rem; right: 1.5rem;
    background: var(--mint-dim);
    color: var(--mint);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* ── FAQ ── */
  .faq-wrap { max-width: 800px; margin: 3.5rem auto 0; }
  .faq-item {
    border-bottom: 1px solid var(--border);
